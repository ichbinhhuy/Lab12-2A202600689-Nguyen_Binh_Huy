<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CoffeeHolic – AI Cafe Recommender</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800&family=Inter:wght@300;400;500;600&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    :root {
      --cream:   #FAF6F0;
      --latte:   #E8D5B7;
      --mocha:   #C4956A;
      --espresso:#7B4F2E;
      --dark:    #3D2314;
      --rust:    #A0522D;
    }

    * { box-sizing: border-box; }

    body {
      background: #2C1810;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      overflow: hidden;
    }

    /* ── Phone shell ── */
    .phone {
      position: relative;
      width: 390px;
      height: 844px;
      background: var(--cream);
      border-radius: 48px;
      border: 11px solid #1a0e08;
      box-shadow: 0 30px 80px rgba(0,0,0,.7), inset 0 1px 0 rgba(255,255,255,.08);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    @media (max-width: 430px) {
      body { background: var(--cream); align-items: flex-start; }
      .phone { width: 100vw; height: 100dvh; border-radius: 0; border: none; box-shadow: none; }
    }

    /* ── Status bar ── */
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 24px 6px;
      font-size: 11px;
      font-weight: 600;
      color: var(--dark);
      flex-shrink: 0;
      position: relative;
      z-index: 10;
    }
    .notch {
      position: absolute;
      top: 8px;
      left: 50%;
      transform: translateX(-50%);
      width: 110px;
      height: 26px;
      background: #1a0e08;
      border-radius: 50px;
    }
    .status-icons { display: flex; gap: 4px; align-items: center; }

    /* ── Screen system ── */
    .screen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      transition: opacity .35s ease, transform .35s ease;
    }
    .screen.hidden { opacity: 0; pointer-events: none; }
    .screen.slide-up   { transform: translateY(100%); }
    .screen.slide-down { transform: translateY(-100%); }

    /* ══════════════════════════════════════
       SCREEN 1 – INTRO
    ══════════════════════════════════════ */
    #screen-intro {
      background: linear-gradient(160deg, #F5ECD7 0%, #E8D5B7 40%, #D4B896 100%);
    }

    .intro-texture {
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(circle at 20% 20%, rgba(122,79,46,.12) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(122,79,46,.10) 0%, transparent 50%),
        url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%237B4F2E' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      pointer-events: none;
    }

    .intro-hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 0 32px;
    }

    .coffee-ring {
      position: absolute;
      width: 280px;
      height: 280px;
      border-radius: 50%;
      border: 2px solid rgba(123,79,46,.15);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
    .coffee-ring:nth-child(2) { width: 230px; height: 230px; border-color: rgba(123,79,46,.2); }
    .coffee-ring:nth-child(3) { width: 180px; height: 180px; border-color: rgba(123,79,46,.25); }

    .coffee-cup-icon {
      width: 100px;
      height: 100px;
      background: linear-gradient(145deg, #A0622D, #7B4F2E);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 12px 40px rgba(123,79,46,.4), 0 4px 12px rgba(123,79,46,.3);
      margin-bottom: 28px;
      position: relative;
      z-index: 1;
    }

    .brand-title {
      font-family: 'Playfair Display', serif;
      font-size: 44px;
      font-weight: 800;
      color: var(--espresso);
      text-align: center;
      line-height: 1.1;
      letter-spacing: -0.5px;
      margin-bottom: 12px;
      position: relative;
      z-index: 1;
    }
    .brand-subtitle {
      font-family: 'Lora', serif;
      font-style: italic;
      font-size: 14px;
      color: var(--mocha);
      text-align: center;
      letter-spacing: 0.5px;
      margin-bottom: 48px;
      position: relative;
      z-index: 1;
    }

    .btn-start {
      width: 100%;
      max-width: 280px;
      padding: 18px 0;
      background: linear-gradient(135deg, #A0522D, #7B4F2E);
      color: #FAF6F0;
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 8px 30px rgba(123,79,46,.45), 0 2px 8px rgba(123,79,46,.25);
      transition: all .2s ease;
      position: relative;
      z-index: 1;
    }
    .btn-start:hover  { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(123,79,46,.5); }
    .btn-start:active { transform: translateY(0px);  box-shadow: 0 4px 16px rgba(123,79,46,.4); }

    .intro-bottom-hint {
      padding: 16px;
      text-align: center;
      font-size: 11px;
      color: var(--mocha);
      letter-spacing: 0.3px;
      font-family: 'Lora', serif;
      font-style: italic;
    }

    /* ══════════════════════════════════════
       SCREEN 2 – SWIPE
    ══════════════════════════════════════ */
    #screen-swipe {
      background: var(--cream);
    }

    .swipe-header {
      padding: 12px 20px 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
      margin-top: 42px;
    }
    .swipe-logo {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--espresso);
    }
    .like-counter {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #FFF8F0;
      border: 1.5px solid #E8D5B7;
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 13px;
      font-weight: 600;
      color: var(--espresso);
    }
    .like-counter .hearts { display: flex; gap: 3px; }
    .like-counter .heart-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #ddd;
      transition: background .25s;
    }
    .like-counter .heart-dot.filled { background: #E74C3C; }

    /* Deck */
    .deck-wrap {
      flex: 1;
      position: relative;
      margin: 8px 16px 0;
      overflow: hidden;
    }

    .cafe-card {
      position: absolute;
      inset: 0;
      border-radius: 28px;
      overflow: hidden;
      background: #fff;
      box-shadow: 0 8px 32px rgba(61,35,20,.14), 0 2px 8px rgba(61,35,20,.08);
      cursor: grab;
      user-select: none;
      touch-action: none;
      display: flex;
      flex-direction: column;
      transition: box-shadow .2s;
    }
    .cafe-card:active { cursor: grabbing; box-shadow: 0 16px 48px rgba(61,35,20,.2); }

    /* Info bar at top of card */
    .card-info-top {
      position: absolute;
      top: 14px;
      left: 14px;
      right: 14px;
      z-index: 5;
      padding: 14px 15px 13px;
      background: rgba(247, 248, 249, .92);
      border: 1px solid rgba(255, 255, 255, .82);
      border-radius: 18px;
      box-shadow: 0 6px 18px rgba(61, 35, 20, .12);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .card-cafe-name {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 4px;
      line-height: 1.2;
    }
    .card-stars { display: flex; align-items: center; gap: 4px; margin-bottom: 5px; }
    .card-stars span { font-size: 11px; font-weight: 600; color: var(--espresso); margin-left: 2px; }
    .star-icons {
      display: inline-flex;
      align-items: center;
      gap: 2px;
      flex-wrap: nowrap;
      white-space: nowrap;
      line-height: 1;
    }
    .star-icons svg {
      display: block;
      flex: 0 0 auto;
    }
    .card-address {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: var(--mocha);
      font-weight: 500;
    }

    .card-photo {
      flex: 1;
      object-fit: cover;
      width: 100%;
      pointer-events: none;
      display: block;
    }

    /* Stamp overlays */
    .stamp {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      padding: 10px 22px;
      border-radius: 12px;
      border: 4px solid;
      font-size: 28px;
      font-weight: 900;
      letter-spacing: 2px;
      opacity: 0;
      pointer-events: none;
      z-index: 20;
      transition: opacity .1s;
    }
    .stamp-like  { left: 20px;  color: #27ae60; border-color: #27ae60; transform: translateY(-50%) rotate(-10deg); }
    .stamp-nope  { right: 20px; color: #e74c3c; border-color: #e74c3c; transform: translateY(-50%) rotate(10deg); }

    /* Background cards stacked */
    .cafe-card.bg-card-1 {
      transform: scale(0.96) translateY(14px);
      z-index: 1;
      pointer-events: none;
    }
    .cafe-card.bg-card-2 {
      transform: scale(0.92) translateY(28px);
      z-index: 0;
      pointer-events: none;
    }
    .cafe-card.top-card { z-index: 3; }

    /* Empty state */
    .deck-empty {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 12px;
      color: var(--mocha);
    }
    .deck-empty p { font-size: 14px; text-align: center; line-height: 1.5; }

    /* Recommend CTA: hidden until the user likes at least one cafe */
    .recommend-cta-wrap {
      display: none;
      padding: 10px 20px 0;
      flex-shrink: 0;
    }
    .recommend-cta-wrap.visible {
      display: block;
    }
    .btn-recommend {
      width: 100%;
      min-height: 46px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: linear-gradient(135deg, #A0522D, #7B4F2E);
      color: #fff;
      border: none;
      border-radius: 16px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: .3px;
      cursor: pointer;
      box-shadow: 0 5px 18px rgba(123, 79, 46, .30);
      transition: transform .15s, opacity .2s, box-shadow .2s;
    }
    .btn-recommend:hover {
      opacity: .92;
      transform: translateY(-1px);
      box-shadow: 0 8px 22px rgba(123, 79, 46, .36);
    }
    .btn-recommend:active {
      transform: scale(.98);
    }

    /* Action bar */
    .action-bar {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 22px;
      padding: 14px 0 20px;
      flex-shrink: 0;
    }

    .action-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      transition: transform .15s, box-shadow .15s;
    }
    .action-btn:hover  { transform: scale(1.08); }
    .action-btn:active { transform: scale(0.93); }

    .btn-nope {
      width: 62px; height: 62px;
      background: #fff;
      box-shadow: 0 4px 20px rgba(231,76,60,.2);
      border: 2px solid rgba(231,76,60,.18);
      color: #e74c3c;
    }
    .btn-love {
      width: 74px; height: 74px;
      background: linear-gradient(135deg, #A0522D, #7B4F2E);
      box-shadow: 0 6px 24px rgba(123,79,46,.45);
      color: #fff;
    }
    .btn-location {
      width: 62px; height: 62px;
      background: #fff;
      box-shadow: 0 4px 20px rgba(52,152,219,.18);
      border: 2px solid rgba(52,152,219,.18);
      color: #3498db;
    }

    /* ══════════════════════════════════════
       SCREEN 3 – LOADING (analyzing)
    ══════════════════════════════════════ */
    #screen-loading {
      background: var(--cream);
      align-items: center;
      justify-content: center;
      gap: 0;
    }

    .loading-ring-wrap {
      position: relative;
      width: 160px;
      height: 160px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 36px;
    }
    @keyframes ring-pulse {
      0%,100% { transform: scale(1);   opacity: .2; }
      50%      { transform: scale(1.2); opacity: .5; }
    }
    .lring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2px solid var(--mocha);
    }
    .lring:nth-child(1) { animation: ring-pulse 1.8s ease-in-out infinite; }
    .lring:nth-child(2) { inset: 18px; animation: ring-pulse 1.8s ease-in-out infinite .4s; }
    .lring:nth-child(3) { inset: 36px; animation: ring-pulse 1.8s ease-in-out infinite .8s; }
    .lring-center {
      width: 72px; height: 72px;
      background: linear-gradient(135deg, #A0522D, #7B4F2E);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 30px rgba(123,79,46,.4);
      position: relative;
      z-index: 1;
    }
    @keyframes bounce-icon {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-6px); }
    }
    .lring-center svg { animation: bounce-icon 1.4s ease-in-out infinite; }

    .loading-title {
      font-family: 'Playfair Display', serif;
      font-size: 26px;
      font-weight: 700;
      color: var(--espresso);
      margin-bottom: 8px;
      text-align: center;
    }
    .loading-status {
      font-size: 13px;
      color: var(--mocha);
      text-align: center;
      min-height: 20px;
      letter-spacing: 0.2px;
    }
    .loading-bar-wrap {
      width: 140px;
      height: 4px;
      background: #E8D5B7;
      border-radius: 10px;
      overflow: hidden;
      margin-top: 24px;
    }
    @keyframes loading-bar {
      0%   { width: 5%; }
      60%  { width: 80%; }
      100% { width: 95%; }
    }
    .loading-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #A0522D, #7B4F2E);
      border-radius: 10px;
      animation: loading-bar 3s ease-out forwards;
    }

    /* ══════════════════════════════════════
       SCREEN 4 – RESULTS LIST
    ══════════════════════════════════════ */
    #screen-results {
      background: var(--cream);
      overflow-y: auto;
    }
    #screen-results::-webkit-scrollbar { display: none; }

    .results-header {
      padding: 16px 20px 14px;
      margin-top: 40px;
    }
    .results-header h2 {
      font-family: 'Playfair Display', serif;
      font-size: 26px;
      font-weight: 700;
      color: var(--espresso);
    }
    .results-header p {
      font-size: 13px;
      color: var(--mocha);
      margin-top: 4px;
      font-family: 'Lora', serif;
      font-style: italic;
    }

    .results-tag-row {
      display: flex;
      gap: 8px;
      padding: 0 20px 16px;
      flex-wrap: wrap;
    }
    
    .vibe-tag {
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      background: #EFE0CC;
      color: var(--espresso);
      border: 1.5px solid #E0C9A8;
      letter-spacing: 0.3px;
    }

    .result-cards-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding: 0 16px 24px;
    }

    .result-card {
      background: #fff;
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(61,35,20,.08);
      border: 1.5px solid #EFE0CC;
      cursor: pointer;
      transition: transform .2s, box-shadow .2s;
      display: flex;
      flex-direction: column;
    }
    .result-card:hover  { transform: translateY(-3px); box-shadow: 0 10px 32px rgba(61,35,20,.14); }
    .result-card:active { transform: scale(0.98); }

    .result-card-img {
      width: 100%;
      height: 170px;
      object-fit: cover;
      display: block;
    }

    .result-card-body {
      padding: 14px 16px 16px;
    }
    .result-card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 6px;
    }
    .result-cafe-name {
      font-family: 'Playfair Display', serif;
      font-size: 17px;
      font-weight: 700;
      color: var(--dark);
      line-height: 1.2;
      flex: 1;
    }
    .match-badge {
      background: linear-gradient(135deg, #A0522D, #7B4F2E);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 20px;
      white-space: nowrap;
      margin-left: 10px;
      flex-shrink: 0;
    }
    .result-stars { display: flex; align-items: center; gap: 3px; margin-bottom: 8px; }
    .result-stars span { font-size: 12px; font-weight: 600; color: var(--espresso); margin-left: 4px; }
    .result-address {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      color: var(--mocha);
      margin-bottom: 10px;
    }
    .result-reason {
      font-size: 12px;
      color: #6B4226;
      line-height: 1.5;
      padding: 10px 12px;
      background: #FFF8F0;
      border-radius: 12px;
      border-left: 3px solid var(--mocha);
    }
    .result-action-row {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }
    .btn-maps-small {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 8px 16px;
      background: #EFE0CC;
      color: var(--espresso);
      border: none;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
    }
    .btn-maps-small:hover { background: #E0C9A8; }
    .btn-detail-small {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 8px 16px;
      background: linear-gradient(135deg, #A0522D, #7B4F2E);
      color: #fff;
      border: none;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .2s;
    }
    .btn-detail-small:hover { opacity: .88; }

    .results-back-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      margin: 0 16px 12px;
      padding: 10px 16px;
      background: transparent;
      color: var(--mocha);
      border: 1.5px solid #E8D5B7;
      border-radius: 14px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
    }
    .results-back-btn:hover { background: #EFE0CC; }

    /* ══════════════════════════════════════
       SCREEN 5 – CAFE DETAIL
    ══════════════════════════════════════ */
    #screen-detail {
      background: var(--cream);
      overflow-y: auto;
    }
    #screen-detail::-webkit-scrollbar { display: none; }

    .detail-hero {
      position: relative;
      height: 260px;
      flex-shrink: 0;
    }
    .detail-hero img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .detail-hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(61,35,20,.35) 0%, transparent 40%, rgba(61,35,20,.75) 100%);
    }
    .detail-back {
      position: absolute;
      top: 16px;
      left: 16px;
      width: 38px; height: 38px;
      background: rgba(250,246,240,.88);
      backdrop-filter: blur(8px);
      border-radius: 50%;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--espresso);
      transition: transform .15s;
    }
    .detail-back:active { transform: scale(.9); }
    .detail-match-badge {
      position: absolute;
      top: 16px;
      right: 16px;
      background: rgba(123,79,46,.88);
      backdrop-filter: blur(8px);
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      padding: 6px 14px;
      border-radius: 20px;
    }
    .detail-hero-info {
      position: absolute;
      bottom: 14px;
      left: 16px;
      right: 16px;
    }
    .detail-hero-name {
      font-family: 'Playfair Display', serif;
      font-size: 24px;
      font-weight: 800;
      color: #fff;
      line-height: 1.15;
      text-shadow: 0 2px 8px rgba(0,0,0,.3);
    }
    .detail-hero-cat {
      font-size: 11px;
      color: rgba(255,255,255,.8);
      margin-top: 3px;
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .detail-body { padding: 0 16px 32px; }

    .detail-section {
      background: #fff;
      border-radius: 20px;
      padding: 16px;
      margin-top: 14px;
      border: 1.5px solid #EFE0CC;
    }
    .detail-section-title {
      font-family: 'Playfair Display', serif;
      font-size: 14px;
      font-weight: 700;
      color: var(--espresso);
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 12px;
    }

    .info-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      font-size: 13px;
      color: var(--dark);
      margin-bottom: 10px;
    }
    .info-row:last-child { margin-bottom: 0; }
    .info-icon { color: var(--mocha); flex-shrink: 0; margin-top: 1px; }

    .spectrum-item { margin-bottom: 10px; }
    .spectrum-item:last-child { margin-bottom: 0; }
    .spectrum-label {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      font-weight: 600;
      color: var(--dark);
      margin-bottom: 5px;
    }
    .spectrum-bar-bg {
      height: 7px;
      background: #EFE0CC;
      border-radius: 10px;
      overflow: hidden;
    }
    .spectrum-bar-fill {
      height: 100%;
      border-radius: 10px;
      background: linear-gradient(90deg, #C4956A, #7B4F2E);
      transition: width .6s ease;
    }

    .busy-chart {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      height: 70px;
      gap: 5px;
      padding: 0 4px;
    }
    .busy-bar-col { display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; }
    .busy-bar {
      width: 100%;
      border-radius: 5px 5px 0 0;
      background: linear-gradient(to top, #A0522D, #C4956A);
    }
    .busy-bar-label { font-size: 9px; color: var(--mocha); font-weight: 500; }

    .maps-big-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #A0522D, #7B4F2E);
      color: #fff;
      border: none;
      border-radius: 18px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 16px;
      box-shadow: 0 4px 16px rgba(123,79,46,.35);
      transition: opacity .2s, transform .15s;
    }
    .maps-big-btn:hover  { opacity: .9; transform: translateY(-1px); }
    .maps-big-btn:active { opacity: 1; transform: scale(.98); }

    /* ── Toast ── */
    .toast-wrap {
      position: absolute;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      width: calc(100% - 40px);
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
    }
    .toast {
      padding: 12px 18px;
      border-radius: 16px;
      font-size: 13px;
      font-weight: 500;
      box-shadow: 0 4px 20px rgba(0,0,0,.12);
      display: flex;
      align-items: center;
      gap: 8px;
      animation: toast-in .3s ease, toast-out .3s ease 2.2s forwards;
    }
    @keyframes toast-in  { from { opacity:0; transform: translateY(16px); } to { opacity:1; transform: translateY(0); } }
    @keyframes toast-out { from { opacity:1; } to { opacity:0; } }
    .toast-success { background: #fff; color: #27ae60; border: 1.5px solid #d4edda; }
    .toast-info    { background: #fff; color: var(--espresso); border: 1.5px solid #E8D5B7; }
    .toast-warn    { background: #fff; color: #e67e22; border: 1.5px solid #fde8cc; }

    /* ── no-scrollbar util ── */
    .no-scroll::-webkit-scrollbar { display: none; }
    .no-scroll { scrollbar-width: none; }
  </style>
</head>
<body>

<div class="phone">

  <!-- Status bar -->
  <div class="status-bar">
    <span id="clock">9:41 AM</span>
    <div class="notch"></div>
    <div class="status-icons">
      <svg width="16" height="12" viewBox="0 0 24 16" fill="none"><rect x="0" y="4" width="4" height="12" rx="1" fill="currentColor" opacity=".4"/><rect x="6" y="2" width="4" height="14" rx="1" fill="currentColor" opacity=".6"/><rect x="12" y="0" width="4" height="16" rx="1" fill="currentColor" opacity=".85"/><rect x="18" y="0" width="4" height="16" rx="1" fill="currentColor"/></svg>
      <svg width="16" height="12" viewBox="0 0 24 16" fill="none"><path d="M12 4a9 9 0 0 1 9 9" stroke="currentColor" stroke-width="2" stroke-linecap="round" opacity=".35"/><path d="M12 7a6 6 0 0 1 6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" opacity=".6"/><path d="M12 10a3 3 0 0 1 3 3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><circle cx="12" cy="13" r="1.5" fill="currentColor"/></svg>
      <svg width="26" height="13" viewBox="0 0 26 13" fill="none"><rect x="0" y="1" width="22" height="11" rx="3" stroke="currentColor" stroke-width="1.5" opacity=".35"/><rect x="1.5" y="2.5" width="18" height="8" rx="2" fill="currentColor"/><path d="M23 4.5v4a2 2 0 0 1 0-4z" fill="currentColor" opacity=".4"/></svg>
    </div>
  </div>

  <!-- ════════════════════════════════════════
       SCREEN 1 – INTRO
  ════════════════════════════════════════ -->
  <div class="screen" id="screen-intro">
    <div class="intro-texture"></div>
    <div class="intro-hero">
      <div class="coffee-ring"></div>
      <div class="coffee-ring"></div>
      <div class="coffee-ring"></div>

      <div class="coffee-cup-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="rgba(250,246,240,0.95)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 8h1a4 4 0 0 1 0 8h-1"/>
          <path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4Z"/>
          <line x1="6" y1="2" x2="6" y2="4"/>
          <line x1="10" y1="2" x2="10" y2="4"/>
          <line x1="14" y1="2" x2="14" y2="4"/>
        </svg>
      </div>

      <h1 class="brand-title">CoffeeHolic</h1>
      <p class="brand-subtitle">Find your perfect cafe vibe</p>

      <button class="btn-start" onclick="goToSwipe()">Start</button>
    </div>
    <p class="intro-bottom-hint">Swipe. Match. Sip.</p>
  </div>

  <!-- ════════════════════════════════════════
       SCREEN 2 – SWIPE
  ════════════════════════════════════════ -->
  <div class="screen hidden" id="screen-swipe">
    <div class="swipe-header">
      <span class="swipe-logo">CoffeeHolic</span>
      <div class="like-counter">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="#e74c3c" stroke="#e74c3c" stroke-width="1"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        <div class="hearts">
          <div class="heart-dot" id="dot-1"></div>
          <div class="heart-dot" id="dot-2"></div>
          <div class="heart-dot" id="dot-3"></div>
        </div>
        <span id="like-label" style="font-size:11px;color:#7B4F2E;">0 liked · 0 picks</span>
      </div>
    </div>

    <!-- Card deck -->
    <div class="deck-wrap" id="deck">
      <!-- Injected by JS -->
      <div class="deck-empty" id="deck-empty">
        <svg xmlns="http://www.w3.org/2000/svg" width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="#C4956A" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M17 8h1a4 4 0 0 1 0 8h-1"/><path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4Z"/></svg>
        <p>You've seen all the cafes!<br>Come back tomorrow ☕</p>
      </div>
    </div>

    <!-- Recommend button: appears after the first Like -->
    <div class="recommend-cta-wrap" id="recommend-cta-wrap">
      <button class="btn-recommend" id="btn-recommend" onclick="handleRecommend()">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="m12 3-1.9 5.1L5 10l5.1 1.9L12 17l1.9-5.1L19 10l-5.1-1.9L12 3z"/>
          <path d="m19 16-.9 2.1L16 19l2.1.9L19 22l.9-2.1L22 19l-2.1-.9L19 16z"/>
          <path d="m5 2-.9 2.1L2 5l2.1.9L5 8l.9-2.1L8 5l-2.1-.9L5 2z"/>
        </svg>
        Recommend
      </button>
    </div>

    <!-- Action buttons: X, Heart, Location -->
    <div class="action-bar">
      <button class="action-btn btn-nope" id="btn-nope" onclick="handleNope()">
        <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <button class="action-btn btn-love" id="btn-love" onclick="handleLike()">
        <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 24 24" fill="rgba(255,255,255,.95)" stroke="rgba(255,255,255,.7)" stroke-width="1"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      </button>
      <button class="action-btn btn-location" id="btn-location" onclick="handleLocation()">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
      </button>
    </div>
  </div>

  <!-- ════════════════════════════════════════
       SCREEN 3 – LOADING
  ════════════════════════════════════════ -->
  <div class="screen hidden" id="screen-loading">
    <div class="loading-ring-wrap" style="margin-top:auto;">
      <div class="lring"></div>
      <div class="lring"></div>
      <div class="lring"></div>
      <div class="lring-center">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="rgba(250,246,240,.95)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17 8h1a4 4 0 0 1 0 8h-1"/><path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4Z"/><line x1="6" y1="2" x2="6" y2="4"/><line x1="10" y1="2" x2="10" y2="4"/><line x1="14" y1="2" x2="14" y2="4"/></svg>
      </div>
    </div>
    <h3 class="loading-title">Brewing your matches…</h3>
    <p class="loading-status" id="loading-txt">Analyzing your vibe…</p>
    <div class="loading-bar-wrap" style="margin-bottom:auto;">
      <div class="loading-bar-fill" id="loading-bar"></div>
    </div>
  </div>
<!-- ════════════════════════════════════════
     SCREEN 4 – RESULTS LIST
════════════════════════════════════════ -->
<div class="screen hidden" id="screen-results">

  <!-- Back icon -->
  <button
    onclick="backToPicking()"
    aria-label="Back to picking"
    title="Back to picking"
    style="
      width: 38px;
      height: 38px;
      margin: 42px 16px 0;
      padding: 0;
      background: #ffffff;
      color: var(--espresso);
      border: 1.5px solid #E8D5B7;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      cursor: pointer;
      box-shadow: 0 3px 12px rgba(61, 35, 20, 0.08);
    "
  >
    <svg
      xmlns="http://www.w3.org/2000/svg"
      width="18"
      height="18"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2.5"
      stroke-linecap="round"
      stroke-linejoin="round"
    >
      <polyline points="15 18 9 12 15 6"></polyline>
    </svg>
  </button>

  <div
    class="results-header"
    style="padding-bottom: 4px; margin-top: 0;"
  >
    <h2>Your Matches ✨</h2>
    <p id="results-desc">Based on your vibe selections</p>
  </div>

  <div class="results-tag-row" id="results-tags"></div>

  <div class="result-cards-list" id="results-list"></div>
</div>

  <!-- ════════════════════════════════════════
       SCREEN 5 – CAFE DETAIL
  ════════════════════════════════════════ -->
  <div class="screen hidden" id="screen-detail">
    <div class="detail-hero">
      <img id="d-img" src="" alt="">
      <div class="detail-hero-overlay"></div>
      <button class="detail-back" onclick="goBack('screen-results')">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <div class="detail-match-badge" id="d-match"></div>
      <div class="detail-hero-info">
        <div class="detail-hero-name" id="d-name"></div>
        <div class="detail-hero-cat" id="d-cat"></div>
      </div>
    </div>

    <div class="detail-body">
      <!-- Basic info -->
      <div class="detail-section">
        <div class="detail-section-title">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          Information
        </div>
        <div class="info-row">
          <svg class="info-icon" xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          <span id="d-address"></span>
        </div>
        <div class="info-row">
          <svg class="info-icon" xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
          <span id="d-rating"></span>
        </div>
        <div class="info-row">
          <svg class="info-icon" xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
          <span id="d-category"></span>
        </div>
      </div>

      <!-- AI reason -->
      <div class="detail-section">
        <div class="detail-section-title">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.663 17h4.673M12 3v1m6.364 1.636-.707.707M21 12h-1M4 12H3m3.343-5.657-.707-.707m2.828 9.9a5 5 0 1 1 7.072 0l-.548.547A3.374 3.374 0 0 0 14 18.469V19a2 2 0 1 1-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>
          Why it matches
        </div>
        <p style="font-size:13px;color:#5a3a1a;line-height:1.6;" id="d-reason"></p>
      </div>

      <!-- Vibe spectrum -->
      <div class="detail-section">
        <div class="detail-section-title">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="17" y1="16" x2="23" y2="16"/></svg>
          Vibe Spectrum
        </div>
        <div id="d-spectrum"></div>
      </div>

      <!-- Busy chart -->
      <div class="detail-section">
        <div class="detail-section-title">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
          Peak Hours
        </div>
        <div class="busy-chart" id="d-busy"></div>
      </div>

      <!-- Maps CTA -->
      <button class="maps-big-btn" id="d-maps-btn">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>
        Open in Google Maps
      </button>
    </div>
  </div>

  <!-- Toast container -->
  <div class="toast-wrap" id="toasts"></div>
</div>

<!-- ══════════════════════════════════════════════════════
     JAVASCRIPT
════════════════════════════════════════════════════════ -->
<script src="./frontend/js/app.js"></script>
</body>
</html>
